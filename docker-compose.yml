version: '3.9'

services:

  database:
    image: postgres:15
    container_name: pa-database
    restart: unless-stopped
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    container_name: pa-api
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - database

  etl:
    build: ./etl
    container_name: pa-etl
    env_file: .env
    depends_on:
      - database
      - api

  dashboard:
    build: ./dashboard
    container_name: pa-dashboard
    env_file: .env
    ports:
      - "8050:8050"
    depends_on:
      - api

volumes:
  pgdata: