version: '3.9'

services:

  database:
    build: ./database
    container_name: pa-database
    restart: unless-stopped
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    container_name: pa-api
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      database:
        condition: service_healthy

  etl:
    build: ./etl
    container_name: pa-etl
    restart: unless-stopped
    env_file: .env
    depends_on:
      database:
        condition: service_healthy
      api:
        condition: service_started

  dashboard:
    build: ./dashboard
    container_name: pa-dashboard
    restart: unless-stopped
    env_file: .env
    ports:
      - "8050:8050"
    depends_on:
      api:
        condition: service_started

volumes:
  pgdata: