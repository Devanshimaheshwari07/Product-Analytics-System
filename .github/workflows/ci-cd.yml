name: Product Analytics CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # Lint & Test
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, etl, dashboard]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd ${{ matrix.service }}
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Lint with flake8
        run: |
          cd ${{ matrix.service }}
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

      - name: Run tests (if exist)
        run: |
          cd ${{ matrix.service }}
          if [ -d "tests" ]; then
            pytest tests/ -v
          else
            echo "No tests directory found, skipping..."
          fi

  # Build Docker Images 
  build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    strategy:
      matrix:
        service: [api, etl, dashboard, database]

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=sha
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Integration Test 
  integration-test:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start services
        run: |
          docker compose up -d --build
          echo "Waiting for services to become healthy..."
          sleep 30

      - name: Check service health
        run: |
          # API health
          curl -f http://localhost:8000/health || exit 1
          echo "✅ API is healthy"

          # Dashboard
          curl -f http://localhost:8050/ || exit 1
          echo "✅ Dashboard is accessible"

          # Products endpoint
          curl -f http://localhost:8000/api/v1/products || exit 1
          echo "✅ Products endpoint working"

          # Analytics endpoint
          curl -f http://localhost:8000/api/v1/analytics/overview || exit 1
          echo "✅ Analytics overview working"

      - name: Show service logs on failure
        if: failure()
        run: docker compose logs

      - name: Teardown
        if: always()
        run: docker compose down -v

  # Deploy (Production) 
  deploy:
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "🚀 Deploying to production..."
          # Example future steps:
          # docker compose pull
          # docker compose up -d
          echo "Deployment placeholder — configure for your infrastructure"