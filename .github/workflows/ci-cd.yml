name: Product Analytics CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ─── Lint & Test ──────────────────────────────────────────────
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, etl, dashboard]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd ${{ matrix.service }}
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Lint with flake8
        run: |
          cd ${{ matrix.service }}
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

      - name: Run tests (if exist)
        run: |
          cd ${{ matrix.service }}
          if [ -d "tests" ]; then
            pytest tests/ -v
          else
            echo "No tests directory found, skipping..."
          fi

  # ─── Build Docker Images ──────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    strategy:
      matrix:
        service: [api, etl, dashboard, database]

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=sha
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Integration Test ─────────────────────────────────────────
  integration-test:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cat > .env << EOF
          # Database Configuration
          POSTGRES_USER=analytics_user
          POSTGRES_PASSWORD=secure_password_change_me
          POSTGRES_DB=product_analytics
          POSTGRES_HOST=database
          POSTGRES_PORT=5432
          
          # API Configuration
          API_HOST=0.0.0.0
          API_PORT=8000
          API_ENV=development
          
          # Dashboard Configuration
          DASHBOARD_HOST=0.0.0.0
          DASHBOARD_PORT=8050
          
          # ETL Configuration
          ETL_INTERVAL=300
          EOF
          cat .env

      - name: Install curl
        run: |
          sudo apt-get update
          sudo apt-get install -y curl

      - name: Start services with docker compose
        run: |
          docker compose up -d --build
          echo "⏳ Waiting for services to become healthy..."
          sleep 60

      - name: Check service health with retry logic
        run: |
          MAX_RETRIES=15
          RETRY_DELAY=5
          
          # Function to retry curl with exponential backoff
          check_service() {
            local url=$1
            local name=$2
            local retries=0
            
            while [ $retries -lt $MAX_RETRIES ]; do
              if curl -sf "$url" > /dev/null 2>&1; then
                echo "✅ $name is healthy"
                return 0
              fi
              retries=$((retries + 1))
              echo "⏳ $name not ready yet... (attempt $retries/$MAX_RETRIES)"
              sleep $RETRY_DELAY
            done
            
            echo "❌ $name failed health check"
            return 1
          }
          
          # Check API health
          check_service "http://localhost:8000/health" "API" || exit 1
          
          # Check Dashboard
          check_service "http://localhost:8050/" "Dashboard" || exit 1
          
          # Check API products endpoint
          check_service "http://localhost:8000/api/v1/products" "Products endpoint" || exit 1
          
          # Check Analytics endpoint
          check_service "http://localhost:8000/api/v1/analytics/overview" "Analytics endpoint" || exit 1

      - name: Display service status
        if: always()
        run: |
          echo "🔍 Docker Compose Services Status:"
          docker compose ps

      - name: Show service logs on failure
        if: failure()
        run: |
          echo "📋 Database logs:"
          docker compose logs database --tail 50
          echo "📋 API logs:"
          docker compose logs api --tail 50
          echo "📋 Dashboard logs:"
          docker compose logs dashboard --tail 50
          echo "📋 ETL logs:"
          docker compose logs etl --tail 50

      - name: Run smoke tests
        if: success()
        run: |
          echo "🧪 Running smoke tests..."
          
          # Test API responds with valid JSON
          RESPONSE=$(curl -s http://localhost:8000/api/v1/products)
          if echo "$RESPONSE" | grep -q "{"; then
            echo "✅ API returns valid JSON"
          else
            echo "❌ API response is not valid JSON"
            exit 1
          fi
          
          # Check analytics endpoint returns data
          ANALYTICS=$(curl -s http://localhost:8000/api/v1/analytics/overview)
          if echo "$ANALYTICS" | grep -q "{"; then
            echo "✅ Analytics endpoint returns valid JSON"
          else
            echo "❌ Analytics response is not valid JSON"
            exit 1
          fi

      - name: Teardown services
        if: always()
        run: |
          echo "🧹 Tearing down services..."
          docker compose down -v
          docker compose ps || echo "All services stopped"

  # ─── Deploy (Production) ──────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "🚀 Deploying to production..."
          # Example future deployment steps:
          # 1. SSH into production server
          # 2. Pull latest Docker images from registry
          # 3. Run: docker compose pull && docker compose up -d
          # 4. Run health checks
          # 5. Smoke tests
          echo "Deployment placeholder — configure for your infrastructure"